version: "3.8"

services:
  db:
    image: "postgres:15-alpine"
    container_name: nexus-db
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=nexus_user
      - POSTGRES_PASSWORD=securepassword
      - POSTGRES_DB=nexus_db
    volumes:
      - nexus_pg_data:/var/lib/postgresql/data

  redis:
    image: "redis:alpine"
    container_name: nexus-redis
    ports:
      - "6379:6379"

  minio:
    image: minio/minio
    container_name: nexus-minio
    ports:
      - "9000:9000" # API Port
      - "9001:9001" # Web UI Port
    environment:
      - MINIO_ROOT_USER=nexusadmin
      - MINIO_ROOT_PASSWORD=nexusadmin123
    command: server /data --console-address ":9001"

volumes:
  nexus_pg_data:
